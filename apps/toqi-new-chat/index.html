<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toqi</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #f7efe2;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

#app {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Green blob ─────────────────────────────────────────────── */
/* Standalone element, single radial gradient, bottom-anchored.  */
/* Kept as its own positioned node so it can be animated          */
/* (translate / scale / pulse) independently later.               */
#blob {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 130vw;
  height: 55vh;
  pointer-events: none;
  z-index: 0;
  will-change: transform;
  background: radial-gradient(
    ellipse 50% 50% at 50% 50%,
    rgba(120,185,150,0.85) 0%,
    rgba(120,185,150,0.45) 38%,
    rgba(120,185,150,0.0)  72%);
}

/* ── Top bar ────────────────────────────────────────────────── */
#topbar {
  position: relative;
  z-index: 20;
  flex-shrink: 0;
  height: 72px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 20px 14px;
}

.topbar-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #1c1917;
}

.topbar-btn.right {
  background: rgba(224,196,164,0.85);
}

/* ── Main content area ──────────────────────────────────────── */
#content {
  position: relative;
  z-index: 10;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 8px 20px 16px;
}

#body-text {
  font-size: 17px;
  line-height: 24px;
  font-weight: 400;
  letter-spacing: normal;
  color: #1c1917;
}

/* ── Chat input pill ────────────────────────────────────────── */
#chat-bar {
  flex-shrink: 0;
  position: relative;
  z-index: 20;
  height: 64px;
  background: rgba(250,244,235,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 32px 32px 0 0;
  display: flex;
  align-items: center;
  padding: 0 22px env(safe-area-inset-bottom);
  gap: 8px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
  margin: 0 24px 0;
}

.chat-side-btn {
  width: 28px; height: 28px;
  border: none;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #1c1917;
  flex-shrink: 0;
}

#chat-placeholder {
  flex: 1;
  text-align: center;
  font-size: 18px;
  font-weight: 400;
  color: #8a7d70;
  pointer-events: none;
  user-select: none;
}
</style>
</head>
<body>
<div id="app">

  <div id="blob"></div>

  <div id="topbar">
    <button class="topbar-btn left" aria-label="Menu">
      <i data-lucide="menu" width="22" height="22"></i>
    </button>
    <button class="topbar-btn right" id="new-chat-btn" aria-label="New chat">
      <i data-lucide="message-circle-plus" width="20" height="20"></i>
    </button>
  </div>

  <div id="content">
    <div id="body-text">this is body text. size 17px, line height 24px, weight 400, letter-spacing normal</div>
  </div>

  <div id="chat-bar">
    <button class="chat-side-btn" aria-label="Attach">
      <i data-lucide="plus" width="26" height="26"></i>
    </button>
    <span id="chat-placeholder">Chat with toqi</span>
    <button class="chat-side-btn" aria-label="Voice">
      <i data-lucide="mic" width="24" height="24"></i>
    </button>
  </div>

</div>
<script>
lucide.createIcons();

// ── Blob animation ──────────────────────────────────────────────
// The blob is a standalone element so it can be driven independently.
// GSAP fully owns its transform once the script runs.
const blob = document.getElementById('blob');

// Resting state (bottom-anchored). xPercent keeps it horizontally
// centered against left:50%; yPercent:35 pushes it partly off-screen
// at the bottom, matching the CSS we replaced.
gsap.set(blob, { xPercent: -50, yPercent: 35, scale: 1, transformOrigin: '50% 50%' });

let atCenter = false;
let bobTween = null;

// Continuous mid-air bob: slow vertical float + a gentle scale breathe.
// Two separate tweens with different durations so the motion never
// looks mechanically looped.
function startBob() {
  stopBob();
  bobTween = gsap.timeline();
  bobTween.to(blob, {
    yPercent: '-=4',
    duration: 2.6,
    ease: 'sine.inOut',
    repeat: -1,
    yoyo: true
  }, 0);
  bobTween.to(blob, {
    scale: 1.05,
    duration: 3.4,
    ease: 'sine.inOut',
    repeat: -1,
    yoyo: true
  }, 0);
}

function stopBob() {
  if (bobTween) { bobTween.kill(); bobTween = null; }
}

function toCenter() {
  stopBob();
  gsap.timeline({ onComplete: startBob })
    .to(blob, {
      yPercent: -50,
      scale: 1.1,
      duration: 1.1,
      ease: 'back.out(1.3)'
    });
  atCenter = true;
}

function toBottom() {
  stopBob();
  gsap.to(blob, {
    yPercent: 35,
    scale: 1,
    duration: 0.9,
    ease: 'power3.inOut'
  });
  atCenter = false;
}

document.getElementById('new-chat-btn').addEventListener('click', () => {
  if (atCenter) { toBottom(); } else { toCenter(); }
});
</script>
</body>
</html>
