<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toqi</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #f7efe2;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

#app {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Green blob ─────────────────────────────────────────────── */
/* Soft green glow at the bottom of the screen                   */
#blob {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 85% 40% at 50% 102%,
      rgba(120,185,150,0.75) 0%,
      rgba(120,185,150,0.0)  100%),
    radial-gradient(ellipse 55% 28% at 22% 100%,
      rgba(150,195,150,0.45) 0%,
      rgba(150,195,150,0.0)  100%),
    radial-gradient(ellipse 50% 30% at 80% 104%,
      rgba(100,170,140,0.50) 0%,
      rgba(100,170,140,0.0)  100%);
}

/* ── Top bar ────────────────────────────────────────────────── */
#topbar {
  position: relative;
  z-index: 20;
  flex-shrink: 0;
  height: 72px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 20px 14px;
}

.topbar-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #1c1917;
}

.topbar-btn.right {
  background: rgba(224,196,164,0.85);
}

/* ── Main content area ──────────────────────────────────────── */
#content {
  position: relative;
  z-index: 10;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding: 8px 20px 16px;
}

#body-text {
  font-size: 17px;
  line-height: 24px;
  font-weight: 400;
  letter-spacing: normal;
  color: #1c1917;
}

/* ── Chat input pill ────────────────────────────────────────── */
#chat-bar {
  flex-shrink: 0;
  position: relative;
  z-index: 20;
  height: 56px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 28px;
  display: flex;
  align-items: center;
  padding: 0 8px 0 16px;
  gap: 8px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  margin: 0 16px max(12px, env(safe-area-inset-bottom));
}

.chat-side-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: none;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #1c1917;
  flex-shrink: 0;
}

#chat-placeholder {
  flex: 1;
  font-size: 17px;
  font-weight: 400;
  color: #9a8a7a;
  pointer-events: none;
  user-select: none;
}
</style>
</head>
<body>
<div id="app">

  <div id="blob"></div>

  <div id="topbar">
    <button class="topbar-btn left" aria-label="Menu">
      <i data-lucide="menu" width="22" height="22"></i>
    </button>
    <button class="topbar-btn right" aria-label="New chat">
      <i data-lucide="message-circle-plus" width="20" height="20"></i>
    </button>
  </div>

  <div id="content">
    <div id="body-text">this is body text. size 17px, line height 24px, weight 400, letter-spacing normal</div>
  </div>

  <div id="chat-bar">
    <button class="chat-side-btn" aria-label="Attach">
      <i data-lucide="plus" width="22" height="22"></i>
    </button>
    <span id="chat-placeholder">Chat with toqi</span>
    <button class="chat-side-btn" aria-label="Voice">
      <i data-lucide="mic" width="22" height="22"></i>
    </button>
  </div>

</div>
<script>
lucide.createIcons();
</script>
</body>
</html>
