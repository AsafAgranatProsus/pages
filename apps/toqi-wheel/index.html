<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toqi — What's on your mind?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0e8;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    touch-action: none;
  }

  .header {
    padding: 48px 24px 16px;
    text-align: center;
    z-index: 10;
    position: relative;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -0.3px;
  }

  .header p {
    font-size: 14px;
    color: #888;
    margin-top: 4px;
  }

  .wheel-viewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  /* Ring anchor — positioned via JS from vw/vh */
  .wheel-ring {
    position: absolute;
    width: 1px;
    height: 1px;
    pointer-events: all;
    cursor: grab;
    will-change: transform;
  }

  .wheel-ring:active { cursor: grabbing; }

  .btn-wrapper {
    position: absolute;
    transform-origin: center center;
    pointer-events: all;
  }

  .btn {
    background: #1a1a1a;
    color: #e8dcc8;
    border-radius: 14px;
    padding: 8px 12px;
    width: 136px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }

  .btn:active, .btn.active { background: #3a3020; }

  .btn .title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn .subtitle {
    font-size: 11px;
    color: #a89878;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #aaa;
    z-index: 10;
    pointer-events: none;
  }

  /* --- Tuning panel --- */
  #tuner {
    position: fixed;
    bottom: 60px;
    right: 12px;
    z-index: 100;
    background: rgba(255,255,255,0.92);
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 11px;
    color: #333;
    width: 200px;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }

  #tuner h3 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    margin-bottom: 8px;
  }

  .tune-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 6px;
  }

  .tune-row label {
    flex: 0 0 60px;
    font-size: 11px;
    color: #555;
  }

  .tune-row input[type=range] {
    flex: 1;
    accent-color: #1a1a1a;
  }

  .tune-row span {
    flex: 0 0 36px;
    text-align: right;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    color: #1a1a1a;
  }

  #tuner-copy {
    margin-top: 8px;
    width: 100%;
    padding: 5px;
    font-size: 11px;
    background: #1a1a1a;
    color: #e8dcc8;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  #tuner-vals {
    margin-top: 6px;
    font-size: 10px;
    color: #888;
    word-break: break-all;
    line-height: 1.4;
  }
</style>
</head>
<body>

<div class="header">
  <h1>What's on your mind?</h1>
  <p>Spin to explore</p>
</div>

<div class="wheel-viewport">
  <div class="wheel-ring" id="ring"></div>
</div>

<div class="hint">Drag to spin · Tap to start</div>

<!-- Tuning panel -->
<div id="tuner">
  <h3>Position tuner</h3>

  <div class="tune-row">
    <label>X (vw%)</label>
    <input type="range" id="t-x" min="-50" max="150" step="1" value="92">
    <span id="v-x">92</span>
  </div>

  <div class="tune-row">
    <label>Y (vh%)</label>
    <input type="range" id="t-y" min="-50" max="150" step="1" value="115">
    <span id="v-y">115</span>
  </div>

  <div class="tune-row">
    <label>Radius%</label>
    <input type="range" id="t-r" min="40" max="160" step="1" value="92">
    <span id="v-r">92</span>
  </div>

  <div class="tune-row">
    <label>Gap (px)</label>
    <input type="range" id="t-g" min="100" max="300" step="5" value="160">
    <span id="v-g">160</span>
  </div>

  <button id="tuner-copy">Copy values</button>
  <div id="tuner-vals"></div>
</div>

<script>
const ITEMS = [
  { title: "Morning routine",   sub: "Start strong" },
  { title: "Inbox triage",      sub: "Zero in minutes" },
  { title: "Grocery run",       sub: "Fridge, restocked" },
  { title: "Tonight's dinner",  sub: "Sorted in seconds" },
  { title: "Weekend escape",    sub: "Somewhere new" },
  { title: "Flight tickets",    sub: "Nail them first" },
  { title: "Latest brief",      sub: "Your day in a nutshell" },
  { title: "Tomorrow",          sub: "Set up tonight" },
  { title: "Big decision",      sub: "Think it through" },
  { title: "Save more",         sub: "Small wins add up" },
  { title: "Mood check",        sub: "How are you, really" },
  { title: "Deep clean",        sub: "One room at a time" },
  { title: "Family plans",      sub: "Everyone in sync" },
  { title: "Subscriptions",     sub: "Trim the waste" },
  { title: "Local finds",       sub: "Hidden gems near you" },
  { title: "New skill",         sub: "Ten minutes a day" },
  { title: "Errand run",        sub: "Batch and done" },
  { title: "Birthday watch",    sub: "Never miss one" },
  { title: "Mindful move",      sub: "Reset the body" },
  { title: "Travel hacks",      sub: "Skip the lines" },
  { title: "Weekly review",     sub: "Close the loop" },
  { title: "Meal prep",         sub: "Sunday, sorted" },
  { title: "Workout plan",      sub: "Move today" },
  { title: "Packing list",      sub: "Forget nothing" },
  { title: "Date night",        sub: "Plan the spark" },
  { title: "Meeting prep",      sub: "Walk in ready" },
  { title: "Budget check",      sub: "Know your numbers" },
  { title: "Reading list",      sub: "Saved for later" },
  { title: "Water break",       sub: "Hydrate, repeat" },
  { title: "Gift ideas",        sub: "They'll love it" },
  { title: "Focus block",       sub: "Guard your deep work" },
  { title: "Quick recipe",      sub: "Five ingredients, max" },
  { title: "Trip planner",      sub: "Idea to itinerary" },
  { title: "Bill reminders",    sub: "Never late again" },
];

const ring = document.getElementById('ring');

// --- Tunable params ---
let anchorXpct = 92;   // % of vw
let anchorYpct = 115;  // % of vh
let radiusPct  = 92;   // % of screen diagonal
let gapPx      = 160;  // arc distance between button centres (px)

function getRadius() {
  const diag = Math.sqrt(window.innerWidth ** 2 + window.innerHeight ** 2);
  return diag * (radiusPct / 100);
}

function positionRing() {
  const x = window.innerWidth  * (anchorXpct / 100);
  const y = window.innerHeight * (anchorYpct / 100);
  ring.style.left = x + 'px';
  ring.style.top  = y + 'px';
}

let currentAngle = -90;
let velocity = 0;
let isDragging = false;
let rafId = null;
let lastDragY = null;
let lastDragTime = null;

function buildWheel() {
  ring.innerHTML = '';
  const R = getRadius();
  // How many items fit around the full circle at the target arc gap?
  const N = Math.max(ITEMS.length, Math.round((2 * Math.PI * R) / gapPx));
  const angleStep = 360 / N;

  for (let i = 0; i < N; i++) {
    const item = ITEMS[i % ITEMS.length];
    const angleDeg = i * angleStep;
    const angleRad = (angleDeg * Math.PI) / 180;

    const x = R * Math.cos(angleRad);
    const y = R * Math.sin(angleRad);

    const wrapper = document.createElement('div');
    wrapper.className = 'btn-wrapper';
    wrapper.style.transform = `translate(${x - 68}px, ${y - 20}px) rotate(${angleDeg + 180}deg)`;

    const btn = document.createElement('div');
    btn.className = 'btn';
    btn.innerHTML = `<div class="title">${item.title}</div><div class="subtitle">${item.sub}</div>`;

    btn.addEventListener('click', () => {
      if (Math.abs(velocity) > 0.5) return;
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      console.log('Selected:', item.title);
    });

    wrapper.appendChild(btn);
    ring.appendChild(wrapper);
  }
}

function setRingAngle(deg) {
  ring.style.transform = `rotate(${deg}deg)`;
}

function onPointerDown(e) {
  isDragging = true;
  velocity = 0;
  if (rafId) cancelAnimationFrame(rafId);
  lastDragY = e.touches ? e.touches[0].clientY : e.clientY;
  lastDragTime = performance.now();
  e.preventDefault();
}

function onPointerMove(e) {
  if (!isDragging) return;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const now = performance.now();
  const dy = clientY - lastDragY;
  const dt = now - lastDragTime;
  const dAngle = -(dy / getRadius()) * (180 / Math.PI);

  currentAngle += dAngle;
  setRingAngle(currentAngle);

  if (dt > 0) velocity = dAngle / dt;
  lastDragY = clientY;
  lastDragTime = now;
  e.preventDefault();
}

function onPointerUp() {
  if (!isDragging) return;
  isDragging = false;
  startInertia();
}

function startInertia() {
  const FRICTION = 0.96;
  const MIN_VEL = 0.001;

  function frame() {
    velocity *= FRICTION;
    if (Math.abs(velocity) < MIN_VEL) { velocity = 0; return; }
    currentAngle += velocity * 16;
    setRingAngle(currentAngle);
    rafId = requestAnimationFrame(frame);
  }

  rafId = requestAnimationFrame(frame);
}

ring.addEventListener('touchstart', onPointerDown, { passive: false });
ring.addEventListener('touchmove',  onPointerMove, { passive: false });
ring.addEventListener('touchend',   onPointerUp);
ring.addEventListener('mousedown',  onPointerDown);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup',   onPointerUp);

// --- Tuner wiring ---
function applyTuner() {
  positionRing();
  buildWheel();
  setRingAngle(currentAngle);
  updateTunerDisplay();
}

function updateTunerDisplay() {
  document.getElementById('tuner-vals').textContent =
    `X:${anchorXpct}vw  Y:${anchorYpct}vh  R:${radiusPct}%diag  G:${gapPx}px`;
}

function wire(sliderId, valId, setter) {
  const slider = document.getElementById(sliderId);
  const val    = document.getElementById(valId);
  slider.addEventListener('input', () => {
    val.textContent = slider.value;
    setter(Number(slider.value));
    applyTuner();
  });
}

wire('t-x', 'v-x', v => anchorXpct = v);
wire('t-y', 'v-y', v => anchorYpct = v);
wire('t-r', 'v-r', v => radiusPct  = v);
wire('t-g', 'v-g', v => gapPx      = v);

document.getElementById('tuner-copy').addEventListener('click', () => {
  const txt = `anchorXpct=${anchorXpct}, anchorYpct=${anchorYpct}, radiusPct=${radiusPct}, gapPx=${gapPx}`;
  navigator.clipboard.writeText(txt).catch(() => {});
  document.getElementById('tuner-vals').textContent = 'Copied: ' + txt;
});

// Rebuild on orientation/resize
window.addEventListener('resize', () => {
  positionRing();
  buildWheel();
  setRingAngle(currentAngle);
});

// Init
positionRing();
buildWheel();
setRingAngle(currentAngle);
updateTunerDisplay();
</script>
</body>
</html>
