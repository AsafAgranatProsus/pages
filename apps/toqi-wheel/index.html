<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toqi — What's on your mind?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0e8;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    touch-action: none;
  }

  .header {
    padding: 48px 24px 16px;
    text-align: center;
    z-index: 10;
    position: relative;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -0.3px;
  }

  .header p {
    font-size: 14px;
    color: #888;
    margin-top: 4px;
  }

  .wheel-viewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  /* Ring anchor — positioned via JS from vw/vh */
  .wheel-ring {
    position: absolute;
    width: 1px;
    height: 1px;
    pointer-events: all;
    cursor: grab;
    will-change: transform;
  }

  .wheel-ring:active { cursor: grabbing; }

  .btn-wrapper {
    position: absolute;
    transform-origin: center center;
    pointer-events: all;
  }

  .btn {
    background: #1a1a1a;
    color: #e8dcc8;
    border-radius: 14px;
    padding: 8px 12px;
    width: 136px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }

  .btn:active, .btn.active { background: #3a3020; }

  .btn .title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn .subtitle {
    font-size: 11px;
    color: #a89878;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #aaa;
    z-index: 10;
    pointer-events: none;
  }

  /* --- Tuning panel --- */
  #tuner {
    position: fixed;
    bottom: 60px;
    right: 12px;
    z-index: 100;
    background: rgba(255,255,255,0.92);
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 11px;
    color: #333;
    width: 200px;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }

  #tuner-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: grab;
    user-select: none;
    margin-bottom: 8px;
  }

  #tuner-head:active {
    cursor: grabbing;
  }

  #tuner h3 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    margin: 0;
  }

  #tuner-toggle {
    flex: 0 0 auto;
    width: 18px;
    height: 18px;
    line-height: 18px;
    text-align: center;
    border: none;
    background: transparent;
    color: #888;
    font-size: 12px;
    cursor: pointer;
  }

  #tuner.collapsed #tuner-body {
    display: none;
  }

  #tuner.collapsed h3 {
    margin: 0;
  }

  .tune-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 6px;
  }

  .tune-row label {
    flex: 0 0 60px;
    font-size: 11px;
    color: #555;
  }

  .tune-row input[type=range] {
    flex: 1;
    accent-color: #1a1a1a;
  }

  .tune-row input[type=checkbox] {
    flex: 1;
    accent-color: #1a1a1a;
    align-self: center;
    margin: 0;
  }

  .tune-row span {
    flex: 0 0 36px;
    text-align: right;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    color: #1a1a1a;
  }

  #tuner-copy {
    margin-top: 8px;
    width: 100%;
    padding: 5px;
    font-size: 11px;
    background: #1a1a1a;
    color: #e8dcc8;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  #tuner-vals {
    margin-top: 6px;
    font-size: 10px;
    color: #888;
    word-break: break-all;
    line-height: 1.4;
  }
</style>
</head>
<body>

<div class="header">
  <h1>What's on your mind?</h1>
  <p>Spin to explore</p>
</div>

<div class="wheel-viewport">
  <div class="wheel-ring" id="ring"></div>
</div>

<div class="hint">Drag to spin · Tap to start</div>

<!-- Tuning panel -->
<div id="tuner">
  <div id="tuner-head">
    <h3>Position tuner</h3>
    <button id="tuner-toggle" title="Collapse">▾</button>
  </div>

  <div id="tuner-body">
  <div class="tune-row">
    <label>X (%diag)</label>
    <input type="range" id="t-x" min="-20" max="120" step="1" value="63">
    <span id="v-x">63</span>
  </div>

  <div class="tune-row">
    <label>Y (%diag)</label>
    <input type="range" id="t-y" min="-20" max="120" step="1" value="53">
    <span id="v-y">53</span>
  </div>

  <div class="tune-row">
    <label>Radius (%diag)</label>
    <input type="range" id="t-r" min="5" max="100" step="1" value="40">
    <span id="v-r">40</span>
  </div>

  <div class="tune-row">
    <label>Items (0=auto)</label>
    <input type="range" id="t-n" min="0" max="80" step="1" value="32">
    <span id="v-n">32</span>
  </div>

  <div class="tune-row">
    <label>Flip buttons</label>
    <input type="checkbox" id="t-flip">
    <span id="v-flip">off</span>
  </div>

  <button id="tuner-copy">Copy values</button>
  <div id="tuner-vals"></div>
  </div>
</div>

<script>
const ITEMS = [
  { title: "Morning routine",   sub: "Start strong" },
  { title: "Inbox triage",      sub: "Zero in minutes" },
  { title: "Grocery run",       sub: "Fridge, restocked" },
  { title: "Tonight's dinner",  sub: "Sorted in seconds" },
  { title: "Weekend escape",    sub: "Somewhere new" },
  { title: "Flight tickets",    sub: "Nail them first" },
  { title: "Latest brief",      sub: "Your day in a nutshell" },
  { title: "Tomorrow",          sub: "Set up tonight" },
  { title: "Big decision",      sub: "Think it through" },
  { title: "Save more",         sub: "Small wins add up" },
  { title: "Mood check",        sub: "How are you, really" },
  { title: "Deep clean",        sub: "One room at a time" },
  { title: "Family plans",      sub: "Everyone in sync" },
  { title: "Subscriptions",     sub: "Trim the waste" },
  { title: "Local finds",       sub: "Hidden gems near you" },
  { title: "New skill",         sub: "Ten minutes a day" },
  { title: "Errand run",        sub: "Batch and done" },
  { title: "Birthday watch",    sub: "Never miss one" },
  { title: "Mindful move",      sub: "Reset the body" },
  { title: "Travel hacks",      sub: "Skip the lines" },
  { title: "Weekly review",     sub: "Close the loop" },
  { title: "Meal prep",         sub: "Sunday, sorted" },
  { title: "Workout plan",      sub: "Move today" },
  { title: "Packing list",      sub: "Forget nothing" },
  { title: "Date night",        sub: "Plan the spark" },
  { title: "Meeting prep",      sub: "Walk in ready" },
  { title: "Budget check",      sub: "Know your numbers" },
  { title: "Reading list",      sub: "Saved for later" },
  { title: "Water break",       sub: "Hydrate, repeat" },
  { title: "Gift ideas",        sub: "They'll love it" },
  { title: "Focus block",       sub: "Guard your deep work" },
  { title: "Quick recipe",      sub: "Five ingredients, max" },
  { title: "Trip planner",      sub: "Idea to itinerary" },
  { title: "Bill reminders",    sub: "Never late again" },
];

const ring = document.getElementById('ring');

// --- Tunable params ---
let anchorXpct = 63;   // % of screen diagonal
let anchorYpct = 53;   // % of screen diagonal
let radiusPct  = 40;   // % of screen diagonal
let gapPx      = 135;  // arc distance between button centres (px)
let itemCount  = 32;   // 0 = auto (derived from gapPx)
let flipButtons = false; // flip button text 180° (upright when viewing right side)

function getRadius() {
  return getDiag() * (radiusPct / 100);
}

function getDiag() {
  return Math.sqrt(window.innerWidth ** 2 + window.innerHeight ** 2);
}

function positionRing() {
  const diag = getDiag();
  const x = diag * (anchorXpct / 100);
  const y = diag * (anchorYpct / 100);
  ring.style.left = x + 'px';
  ring.style.top  = y + 'px';
}

let currentAngle = -90;
let velocity = 0;
let isDragging = false;
let rafId = null;
let lastDragY = null;
let lastDragTime = null;

function buildWheel() {
  ring.innerHTML = '';
  const R = getRadius();
  // Item count: explicit override or derived from arc gap
  const N = itemCount > 0
    ? itemCount
    : Math.max(ITEMS.length, Math.round((2 * Math.PI * R) / gapPx));
  const angleStep = 360 / N;

  for (let i = 0; i < N; i++) {
    const item = ITEMS[i % ITEMS.length];
    const angleDeg = i * angleStep;
    const angleRad = (angleDeg * Math.PI) / 180;

    const x = R * Math.cos(angleRad);
    const y = R * Math.sin(angleRad);

    const wrapper = document.createElement('div');
    wrapper.className = 'btn-wrapper';
    const flipDeg = flipButtons ? 180 : 0;
    wrapper.style.transform = `translate(${x - 68}px, ${y - 20}px) rotate(${angleDeg + 180 + flipDeg}deg)`;

    const btn = document.createElement('div');
    btn.className = 'btn';
    btn.innerHTML = `<div class="title">${item.title}</div><div class="subtitle">${item.sub}</div>`;

    btn.addEventListener('click', () => {
      if (Math.abs(velocity) > 0.5) return;
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      console.log('Selected:', item.title);
    });

    wrapper.appendChild(btn);
    ring.appendChild(wrapper);
  }
}

function setRingAngle(deg) {
  ring.style.transform = `rotate(${deg}deg)`;
}

function onPointerDown(e) {
  isDragging = true;
  velocity = 0;
  if (rafId) cancelAnimationFrame(rafId);
  lastDragY = e.touches ? e.touches[0].clientY : e.clientY;
  lastDragTime = performance.now();
  e.preventDefault();
}

function onPointerMove(e) {
  if (!isDragging) return;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const now = performance.now();
  const dy = clientY - lastDragY;
  const dt = now - lastDragTime;
  const dAngle = -(dy / getRadius()) * (180 / Math.PI);

  currentAngle += dAngle;
  setRingAngle(currentAngle);

  if (dt > 0) velocity = dAngle / dt;
  lastDragY = clientY;
  lastDragTime = now;
  e.preventDefault();
}

function onPointerUp() {
  if (!isDragging) return;
  isDragging = false;
  startInertia();
}

function startInertia() {
  const FRICTION = 0.96;
  const MIN_VEL = 0.001;

  function frame() {
    velocity *= FRICTION;
    if (Math.abs(velocity) < MIN_VEL) { velocity = 0; return; }
    currentAngle += velocity * 16;
    setRingAngle(currentAngle);
    rafId = requestAnimationFrame(frame);
  }

  rafId = requestAnimationFrame(frame);
}

ring.addEventListener('touchstart', onPointerDown, { passive: false });
ring.addEventListener('touchmove',  onPointerMove, { passive: false });
ring.addEventListener('touchend',   onPointerUp);
ring.addEventListener('mousedown',  onPointerDown);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup',   onPointerUp);

// --- Tuner wiring ---
function applyTuner() {
  positionRing();
  buildWheel();
  setRingAngle(currentAngle);
  updateTunerDisplay();
}

function updateTunerDisplay() {
  document.getElementById('tuner-vals').textContent =
    `X:${anchorXpct}%d  Y:${anchorYpct}%d  R:${radiusPct}%d  N:${itemCount || 'auto'}  Flip:${flipButtons ? 'on' : 'off'}`;
}

function wire(sliderId, valId, setter) {
  const slider = document.getElementById(sliderId);
  const val    = document.getElementById(valId);
  slider.addEventListener('input', () => {
    val.textContent = slider.value;
    setter(Number(slider.value));
    applyTuner();
  });
}

wire('t-x', 'v-x', v => anchorXpct = v);
wire('t-y', 'v-y', v => anchorYpct = v);
wire('t-r', 'v-r', v => radiusPct  = v);
// Items slider — custom display (0 → "auto")
(function() {
  const slider = document.getElementById('t-n');
  const val    = document.getElementById('v-n');
  slider.addEventListener('input', () => {
    const v = Number(slider.value);
    itemCount = v;
    val.textContent = v === 0 ? 'auto' : v;
    applyTuner();
  });
})();

// Flip buttons toggle
(function() {
  const cb  = document.getElementById('t-flip');
  const val = document.getElementById('v-flip');
  cb.addEventListener('change', () => {
    flipButtons = cb.checked;
    val.textContent = cb.checked ? 'on' : 'off';
    applyTuner();
  });
})();

document.getElementById('tuner-copy').addEventListener('click', () => {
  const txt = `anchorXpct=${anchorXpct}, anchorYpct=${anchorYpct}, radiusPct=${radiusPct}, itemCount=${itemCount}, flipButtons=${flipButtons}`;
  navigator.clipboard.writeText(txt).catch(() => {});
  document.getElementById('tuner-vals').textContent = 'Copied: ' + txt;
});

// Rebuild on orientation/resize
window.addEventListener('resize', () => {
  positionRing();
  buildWheel();
  setRingAngle(currentAngle);
});

// --- Tuner collapse + drag ---
(function() {
  const panel  = document.getElementById('tuner');
  const head   = document.getElementById('tuner-head');
  const toggle = document.getElementById('tuner-toggle');

  // Collapse / expand
  toggle.addEventListener('click', (e) => {
    e.stopPropagation();
    const collapsed = panel.classList.toggle('collapsed');
    toggle.textContent = collapsed ? '▸' : '▾';
    toggle.title = collapsed ? 'Expand' : 'Collapse';
  });

  // Drag — switch from right/bottom anchoring to left/top on first grab
  let dragging = false, startX = 0, startY = 0, startLeft = 0, startTop = 0;

  function onDown(e) {
    if (e.target === toggle) return;
    const pt = e.touches ? e.touches[0] : e;
    const rect = panel.getBoundingClientRect();
    panel.style.left   = rect.left + 'px';
    panel.style.top    = rect.top + 'px';
    panel.style.right  = 'auto';
    panel.style.bottom = 'auto';
    startLeft = rect.left;
    startTop  = rect.top;
    startX = pt.clientX;
    startY = pt.clientY;
    dragging = true;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onUp);
    e.preventDefault();
  }

  function onMove(e) {
    if (!dragging) return;
    const pt = e.touches ? e.touches[0] : e;
    let nl = startLeft + (pt.clientX - startX);
    let nt = startTop  + (pt.clientY - startY);
    // keep within viewport
    nl = Math.max(0, Math.min(nl, window.innerWidth  - panel.offsetWidth));
    nt = Math.max(0, Math.min(nt, window.innerHeight - panel.offsetHeight));
    panel.style.left = nl + 'px';
    panel.style.top  = nt + 'px';
    if (e.cancelable) e.preventDefault();
  }

  function onUp() {
    dragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  }

  head.addEventListener('mousedown', onDown);
  head.addEventListener('touchstart', onDown, { passive: false });
})();

// Init
positionRing();
buildWheel();
setRingAngle(currentAngle);
updateTunerDisplay();
</script>
</body>
</html>
