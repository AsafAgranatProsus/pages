<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toqi</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #f5ede0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  touch-action: none;
}

#app {
  position: relative;
  width: 100vw; height: 100vh;
  overflow: hidden;
}

/* ── Green blob ─────────────────────────────────────────────── */
/* Independent element, multiple radial gradients               */
#blob {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 90% 65% at 55% 18%,
      rgba(60,155,130,0.90) 0%,
      rgba(60,155,130,0.0)  100%),
    radial-gradient(ellipse 60% 45% at 20% 5%,
      rgba(50,140,115,0.60) 0%,
      rgba(50,140,115,0.0)  100%),
    radial-gradient(ellipse 50% 35% at 75% 35%,
      rgba(90,175,150,0.40) 0%,
      rgba(90,175,150,0.0)  100%);
}

/* ── Top bar ────────────────────────────────────────────────── */
#topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 72px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 20px 14px;
  z-index: 20;
}

.topbar-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.30);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #1c1917;
}

.topbar-btn.right {
  background: rgba(232,218,200,0.75);
}

/* ── Wheel layer ────────────────────────────────────────────── */
#wheel-layer {
  position: absolute;
  inset: 0;
  z-index: 5;
  overflow: hidden;
}

.wheel-ring {
  position: absolute;
  width: 1px; height: 1px;
  will-change: transform;
  cursor: grab;
}
.wheel-ring:active { cursor: grabbing; }

.btn-wrapper {
  position: absolute;
  transform-origin: center center;
}

.btn {
  background: #1c1917;
  color: #e8dcc8;
  border-radius: 20px;
  padding: 11px 16px;
  width: 210px;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 11px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  transition: background 0.12s;
}

.btn:active, .btn.active { background: #3a2e20; }

.btn-icon {
  flex-shrink: 0;
  opacity: 0.70;
  display: flex; align-items: center;
}

.btn-text { min-width: 0; }

.btn-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.btn-sub {
  font-size: 12px;
  color: #a89070;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Decorative dots ────────────────────────────────────────── */
#dots {
  position: absolute;
  z-index: 6;
  display: flex;
  gap: 7px;
  top: 42%;
  left: 28%;
  pointer-events: none;
}
.dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  background: #1c1917;
}

/* ── Chat input pill ────────────────────────────────────────── */
#chat-bar {
  position: absolute;
  bottom: max(20px, env(safe-area-inset-bottom));
  left: 16px; right: 16px;
  height: 56px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 28px;
  display: flex;
  align-items: center;
  padding: 0 8px 0 16px;
  gap: 8px;
  z-index: 30;
  box-shadow: 0 2px 20px rgba(0,0,0,0.08);
}

.chat-side-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: none;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #1c1917;
  flex-shrink: 0;
}

#chat-placeholder {
  flex: 1;
  font-size: 17px;
  line-height: 24px;
  font-weight: 400;
  color: #b8a898;
  pointer-events: none;
  user-select: none;
}
</style>
</head>
<body>
<div id="app">

  <div id="blob"></div>

  <div id="topbar">
    <button class="topbar-btn left" aria-label="Menu">
      <i data-lucide="menu" width="22" height="22"></i>
    </button>
    <button class="topbar-btn right" aria-label="New chat">
      <i data-lucide="message-circle-plus" width="20" height="20"></i>
    </button>
  </div>

  <div id="wheel-layer">
    <div class="wheel-ring" id="ring"></div>
  </div>

  <div id="dots">
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div id="chat-bar">
    <button class="chat-side-btn" aria-label="Attach">
      <i data-lucide="plus" width="22" height="22"></i>
    </button>
    <span id="chat-placeholder">Chat with toqi</span>
    <button class="chat-side-btn" aria-label="Voice">
      <i data-lucide="mic" width="22" height="22"></i>
    </button>
  </div>

</div>
<script>
const ITEMS = [
  { title: "Morning routine",  sub: "Start strong",           icon: "sun" },
  { title: "Inbox triage",     sub: "Zero in minutes",        icon: "mail" },
  { title: "Grocery run",      sub: "Fridge, restocked",      icon: "plane" },
  { title: "Tonight's dinner", sub: "Sorted in seconds",      icon: "utensils" },
  { title: "Weekend escape",   sub: "Somewhere new",          icon: "map" },
  { title: "Flight tickets",   sub: "Nail them first",        icon: "plane" },
  { title: "Latest brief",     sub: "Your day in a nutshell", icon: null },
  { title: "Tomorrow",         sub: "Set up tonight",         icon: "calendar" },
  { title: "Big decision",     sub: "Think it through",       icon: "binoculars" },
  { title: "Save more",        sub: "Small wins add up",      icon: "piggy-bank" },
  { title: "Mood check",       sub: "How are you, really",    icon: "heart" },
  { title: "Deep clean",       sub: "One room at a time",     icon: "sparkles" },
  { title: "Family plans",     sub: "Everyone in sync",       icon: "users" },
  { title: "Subscriptions",    sub: "Trim the waste",         icon: "credit-card" },
  { title: "Local finds",      sub: "Hidden gems near you",   icon: "map-pin" },
  { title: "New skill",        sub: "Ten minutes a day",      icon: "book-open" },
  { title: "Errand run",       sub: "Batch and done",         icon: "list-checks" },
  { title: "Birthday watch",   sub: "Never miss one",         icon: "cake" },
  { title: "Mindful move",     sub: "Reset the body",         icon: "activity" },
  { title: "Travel hacks",     sub: "Skip the lines",         icon: "luggage" },
  { title: "Weekly review",    sub: "Close the loop",         icon: "refresh-cw" },
  { title: "Meal prep",        sub: "Sunday, sorted",         icon: "chef-hat" },
  { title: "Workout plan",     sub: "Move today",             icon: "dumbbell" },
  { title: "Packing list",     sub: "Forget nothing",         icon: "package" },
  { title: "Date night",       sub: "Plan the spark",         icon: "star" },
  { title: "Meeting prep",     sub: "Walk in ready",          icon: "presentation" },
  { title: "Budget check",     sub: "Know your numbers",      icon: "bar-chart-2" },
  { title: "Reading list",     sub: "Saved for later",        icon: "bookmark" },
  { title: "Water break",      sub: "Hydrate, repeat",        icon: "droplets" },
  { title: "Gift ideas",       sub: "They'll love it",        icon: "gift" },
  { title: "Focus block",      sub: "Guard your deep work",   icon: "timer" },
  { title: "Quick recipe",     sub: "Five ingredients, max",  icon: "flame" },
  { title: "Trip planner",     sub: "Idea to itinerary",      icon: "compass" },
  { title: "Bill reminders",   sub: "Never late again",       icon: "bell" },
];

// Wheel anchor: far off-screen left, vertically centered
// so only the right arc is visible as a curved list
const ITEM_COUNT = 32;

const ring = document.getElementById('ring');

let currentAngle = -90; // start so top of arc faces right
let velocity = 0;
let isDragging = false;
let rafId = null;
let lastDragY = null;
let lastDragTime = null;

function getDiag() {
  return Math.sqrt(window.innerWidth ** 2 + window.innerHeight ** 2);
}

function getRadius() {
  // Radius large enough that the visible arc spans the full screen height
  // Anchor is off-screen left, so we need R > screen width
  return window.innerWidth * 1.6;
}

function positionRing() {
  // Anchor: off-screen to the left, vertically at ~50% of screen
  ring.style.left = (-window.innerWidth * 0.55) + 'px';
  ring.style.top  = (window.innerHeight * 0.50) + 'px';
}

function buildWheel() {
  ring.innerHTML = '';
  const R = getRadius();
  const N = ITEM_COUNT;
  const angleStep = 360 / N;

  for (let i = 0; i < N; i++) {
    const item = ITEMS[i % ITEMS.length];
    const angleDeg = i * angleStep;
    const angleRad = angleDeg * Math.PI / 180;

    const x = R * Math.cos(angleRad);
    const y = R * Math.sin(angleRad);

    const wrapper = document.createElement('div');
    wrapper.className = 'btn-wrapper';
    wrapper.dataset.index = i;
    wrapper.dataset.baseDeg = angleDeg;
    wrapper.dataset.x = x;
    wrapper.dataset.y = y;

    const btn = document.createElement('div');
    btn.className = 'btn';

    if (item.icon) {
      const iconWrap = document.createElement('div');
      iconWrap.className = 'btn-icon';
      iconWrap.innerHTML = `<i data-lucide="${item.icon}" width="16" height="16"></i>`;
      btn.appendChild(iconWrap);
    }

    const textWrap = document.createElement('div');
    textWrap.className = 'btn-text';
    textWrap.innerHTML =
      `<div class="btn-title">${item.title}</div>` +
      `<div class="btn-sub">${item.sub}</div>`;
    btn.appendChild(textWrap);

    btn.addEventListener('click', () => {
      if (Math.abs(velocity) > 0.5) return;
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });

    wrapper.appendChild(btn);
    ring.appendChild(wrapper);
  }

  lucide.createIcons({ nameAttr: 'data-lucide' });
  renderFrame();
}

function renderFrame() {
  // Rotate the ring container
  ring.style.transform = `rotate(${currentAngle}deg)`;

  // Counter-rotate each button so text stays upright,
  // with tangent orientation (+90°) and flip for left-half buttons
  const wrappers = ring.querySelectorAll('.btn-wrapper');
  wrappers.forEach(wrapper => {
    const angleDeg = Number(wrapper.dataset.baseDeg);
    const x = Number(wrapper.dataset.x);
    const y = Number(wrapper.dataset.y);

    // Absolute angle in world space
    const absAngle = ((angleDeg + currentAngle) % 360 + 360) % 360;
    // Flip buttons that face left so text is always readable
    const flip = (absAngle > 90 && absAngle < 270) ? 180 : 0;

    wrapper.style.transform =
      `translate(${x - 105}px, ${y - 22}px) rotate(${angleDeg + 90 + flip}deg)`;
  });
}

// ── Drag ─────────────────────────────────────────────────────
function onPointerDown(e) {
  isDragging = true;
  velocity = 0;
  if (rafId) cancelAnimationFrame(rafId);
  lastDragY = e.touches ? e.touches[0].clientY : e.clientY;
  lastDragTime = performance.now();
  e.preventDefault();
}

function onPointerMove(e) {
  if (!isDragging) return;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const now = performance.now();
  const dy = clientY - lastDragY;
  const dt = now - lastDragTime;
  const dAngle = -(dy / getRadius()) * (180 / Math.PI);

  currentAngle += dAngle;
  renderFrame();

  if (dt > 0) velocity = dAngle / dt;
  lastDragY = clientY;
  lastDragTime = now;
  e.preventDefault();
}

function onPointerUp() {
  if (!isDragging) return;
  isDragging = false;
  startInertia();
}

function startInertia() {
  const FRICTION = 0.96;
  const MIN_VEL  = 0.001;
  function frame() {
    velocity *= FRICTION;
    if (Math.abs(velocity) < MIN_VEL) { velocity = 0; return; }
    currentAngle += velocity * 16;
    renderFrame();
    rafId = requestAnimationFrame(frame);
  }
  rafId = requestAnimationFrame(frame);
}

ring.addEventListener('touchstart', onPointerDown, { passive: false });
ring.addEventListener('touchmove',  onPointerMove, { passive: false });
ring.addEventListener('touchend',   onPointerUp);
ring.addEventListener('mousedown',  onPointerDown);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup',   onPointerUp);

window.addEventListener('resize', () => {
  positionRing();
  buildWheel();
});

lucide.createIcons();
positionRing();
buildWheel();
</script>
</body>
</html>
