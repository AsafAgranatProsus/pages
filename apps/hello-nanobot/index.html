<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello from Nanobot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #2d3748;
        }
        
        p {
            font-size: 1.1rem;
            color: #4a5568;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .timestamp {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #718096;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="container">
        <h1>Hello from Nanobot</h1>
        <p>This is a test of the GitHub Pages publishing infrastructure. If you're seeing this, the loop works.</p>
        <button id="colorBtn">Change My Color</button>
        <div class="timestamp">Built: <span id="timestamp"></span></div>
    </div>

    <script>
        // Display build timestamp
        const now = new Date();
        document.getElementById('timestamp').textContent = now.toLocaleString('en-GB', {
            timeZone: 'Europe/Amsterdam',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });

        // Color cycling button
        const colors = ['#667eea', '#f56565', '#48bb78', '#ed8936', '#9f7aea', '#38b2ac'];
        let colorIndex = 0;

        document.getElementById('colorBtn').addEventListener('click', function() {
            colorIndex = (colorIndex + 1) % colors.length;
            this.style.background = colors[colorIndex];
        });

        // WebGL fluid background
        const canvas = document.getElementById('bgCanvas');
        const gl = canvas.getContext('webgl', { antialias: false, alpha: false });

        let width, height;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            gl.viewport(0, 0, width, height);
        }

        window.addEventListener('resize', resize);
        resize();

        // Vertex shader
        const vertexShaderSource = `
            attribute vec2 position;
            void main() {
                gl_Position = vec4(position, 0.0, 1.0);
            }
        `;

        // Random seed for pattern variation
        const seed = Math.random() * 10.0;

        // Fragment shader - metaball-like fluid with cursor influence
        const fragmentShaderSource = `
            precision highp float;
            uniform vec2 resolution;
            uniform float time;
            uniform vec2 mouse;
            uniform float seed;

            vec3 palette(float t) {
                vec3 a = vec3(0.5, 0.5, 0.5);
                vec3 b = vec3(0.5, 0.5, 0.5);
                vec3 c = vec3(1.0, 1.0, 1.0);
                vec3 d = vec3(0.263 + seed * 0.1, 0.416 + seed * 0.15, 0.557 + seed * 0.2);
                return a + b * cos(6.28318 * (c * t + d));
            }

            void main() {
                vec2 uv = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
                vec2 mouseUV = (mouse * 2.0 - resolution) / min(resolution.x, resolution.y);

                float dist = length(uv - mouseUV);
                float influence = 0.3 / (dist + 0.1);

                vec2 p = uv;
                float t = time * (0.2 + seed * 0.1);

                for(float i = 0.0; i < 3.0; i++) {
                    p = abs(p) / dot(p, p) - vec2(0.9 + sin(t + i + seed) * 0.2);
                    p += mouseUV * influence * (0.08 + seed * 0.02);
                }

                float d = length(p);
                vec3 col = palette(d + t * 0.4 + influence * 0.2 + seed * 0.3);

                col = mix(col, vec3(1.0), influence * 0.15);

                gl_FragColor = vec4(col, 1.0);
            }
        `;

        function createShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vertexShader = createShader(gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error(gl.getProgramInfoLog(program));
        }

        gl.useProgram(program);

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1
        ]), gl.STATIC_DRAW);

        const positionLocation = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        const resolutionLocation = gl.getUniformLocation(program, 'resolution');
        const timeLocation = gl.getUniformLocation(program, 'time');
        const mouseLocation = gl.getUniformLocation(program, 'mouse');
        const seedLocation = gl.getUniformLocation(program, 'seed');

        document.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        document.addEventListener('touchmove', (e) => {
            targetX = e.touches[0].clientX;
            targetY = e.touches[0].clientY;
        });

        let startTime = Date.now();

        function render() {
            // Smooth mouse movement
            mouseX += (targetX - mouseX) * 0.1;
            mouseY += (targetY - mouseY) * 0.1;

            const time = (Date.now() - startTime) * 0.001;

            gl.uniform2f(resolutionLocation, width, height);
            gl.uniform1f(timeLocation, time);
            gl.uniform2f(mouseLocation, mouseX, height - mouseY);
            gl.uniform1f(seedLocation, seed);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
